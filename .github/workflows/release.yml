name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            arch: arm64
          - target: x86_64-apple-darwin
            os: macos-13
            arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Create app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="OpenGameCore"
          BUNDLE_DIR="target/${{ matrix.target }}/release/${APP_NAME}.app"

          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"

          cp "target/${{ matrix.target }}/release/opengamecore-app" "$BUNDLE_DIR/Contents/MacOS/${APP_NAME}"
          cp "target/${{ matrix.target }}/release/ogc" "$BUNDLE_DIR/Contents/MacOS/ogc"

          cat > "$BUNDLE_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.opengamecore.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
          </dict>
          </plist>
          PLIST

          echo -n "APPL????" > "$BUNDLE_DIR/Contents/PkgInfo"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="OpenGameCore"
          DMG_NAME="OpenGameCore-${VERSION}-macOS-${{ matrix.arch }}"
          DMG_DIR="target/dmg-${{ matrix.arch }}"

          mkdir -p "$DMG_DIR"
          cp -r "target/${{ matrix.target }}/release/${APP_NAME}.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          hdiutil create -volname "$APP_NAME" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "target/${DMG_NAME}.dmg"

      - name: Create CLI tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAR_NAME="ogc-${VERSION}-macOS-${{ matrix.arch }}.tar.gz"
          tar -czf "target/${TAR_NAME}" \
              -C "target/${{ matrix.target }}/release" ogc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            target/OpenGameCore-*-macOS-${{ matrix.arch }}.dmg
            target/ogc-*-macOS-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
